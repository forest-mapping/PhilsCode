name: sort-demo
version: "1.0"
description: Read a CSV, sort by a column, write the result.

blocks:
  - id: "@read"
    name: data.read
    inputs: []
    args:
      uri: "file:///home/pradtke/source/PhilsCode/input.csv"
      format: "CSV"

  - id: "@sort"
    name: PhilsCode.sort_csv
    inputs:
      table: "@read.file"
    args:
      sort_column: "x"
