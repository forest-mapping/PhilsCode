name: GB_est-test
version: "1.0"
description: Query FIA GB_est and reformat result.

blocks:
  - id: "@GB_est"
    name: PhilsCode.GB_est
    inputs: []
    args:
      EVAL_GRP: "512017, 372017"
      ATTRIBUTE_NBR: 10
      GRP_BY_ATTRIB: "STATECD, COUNTYCD"

  - id: "@reformat"
    name: PhilsCode.reformat_fia
    inputs:
      - block: "@GB_est"
        output: "result"
        as: "gb_est_result"
    args:
      unit_ref: "/home/pradtke/source/PhilsCode/ref/STATE_UNIT_COUNTY.csv"
