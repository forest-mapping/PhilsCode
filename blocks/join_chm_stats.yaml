id: PhilsCode.join_chm_stats
version: 0.2.0
kind: standard
network: false

description: >
  Computes a canopy height distribution summary for one county from a
  GFCHM raster (5-ft height bins, area fraction per bin), pivots the
  bins to columns, and right-joins them onto the matching county's row
  in the reformat_fia estimates table by CO_FIPS. Designed to run as a
  mapped block, once per county raster; combine outputs with a reduce
  block (base.reduce_stack) to reconstruct the full multi-county table.

entrypoint: join_chm_stats

inputs:
  fia_data:
    type: file
    format: rds
    description: Reformatted FIA estimates RDS from reformat_fia (broadcast to every invocation).
  state_abbrev:
    type: string
    description: Two-letter state abbreviation (e.g. "VA").
  gfchm_file:
    type: file
    format: GeoTIFF
    description: One county's GFCHM raster (mapped input — one per invocation).
  state_file:
    type: file
    format: CSV
    description: STATES.csv reference (broadcast).
  county_file:
    type: file
    format: CSV
    description: COUNTY.csv reference (broadcast).

outputs:
  result:
    type: file
    format: Parquet
    description: Single county's row from fia_data with CHM height-bin FRAC_HT<N> columns appended.
